<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EV Stansiyalar UZ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{background:#1a1a2e;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2d2d44;flex-shrink:0}
#header h1{font-size:16px;font-weight:700;color:#00d4aa;display:flex;align-items:center;gap:6px}
.badge{background:#00d4aa18;color:#00d4aa;border:1px solid #00d4aa33;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600}
#stats-bar{background:#00d4aa0a;border-bottom:1px solid #00d4aa18;padding:5px 16px;font-size:12px;color:#00d4aa;display:flex;gap:16px;flex-shrink:0}
#filters{background:#1a1a2e;padding:8px 12px;display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid #2d2d44;flex-shrink:0}
#filters::-webkit-scrollbar{display:none}
.filter-btn{background:#2d2d44;color:#888;border:none;border-radius:16px;padding:5px 12px;font-size:12px;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.filter-btn.active{background:#00d4aa;color:#000;font-weight:700}
#map{flex:1;min-height:0;z-index:1}
#bottom-sheet{background:#1a1a2e;border-top:2px solid #2d2d44;height:220px;overflow-y:auto;flex-shrink:0}
#bottom-sheet::-webkit-scrollbar{width:3px}
#bottom-sheet::-webkit-scrollbar-thumb{background:#2d2d44;border-radius:3px}
#bs-header{padding:8px 16px;font-size:12px;color:#666;border-bottom:1px solid #2d2d44;display:flex;justify-content:space-between;align-items:center}
#stations-list{padding:8px 10px}
.station-card{background:#252540;border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;border:1px solid transparent;transition:border-color 0.15s}
.station-card:active{background:#2d2d50}
.station-card.active{border-color:#00d4aa55}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.sc-name{font-size:13px;font-weight:600;color:#eee;line-height:1.3}
.price-tag{background:#00d4aa18;color:#00d4aa;border-radius:6px;padding:2px 7px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;margin-left:8px}
.sc-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.tag{background:#ffffff08;color:#999;border-radius:5px;padding:1px 6px;font-size:11px}
.sc-addr{font-size:11px;color:#666;margin-top:4px}
#empty{text-align:center;padding:30px 20px;color:#555;font-size:13px}
#loading-overlay{position:fixed;inset:0;background:#0f0f0f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:9999}
.spinner{width:32px;height:32px;border:3px solid #2d2d44;border-top-color:#00d4aa;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.leaflet-popup-content-wrapper{background:#1e1e35;color:#eee;border:1px solid #2d2d44;border-radius:10px;box-shadow:0 4px 20px #00000088}
.leaflet-popup-tip{background:#1e1e35}
.leaflet-popup-content{margin:10px 14px;font-size:13px;line-height:1.6}
.popup-price{color:#00d4aa;font-weight:700;font-size:15px}
.popup-net{color:#888;font-size:11px}
.popup-btn{background:#00d4aa;color:#000;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;width:100%;margin-top:6px}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div style="color:#666;font-size:13px">Stansiyalar yuklanmoqda...</div>
</div>

<div id="header">
  <h1>⚡ EV Stansiyalar UZ</h1>
  <span class="badge">1kWh &lt; 2000 so'm</span>
</div>

<div id="stats-bar">
  <span id="stat-count">—</span>
  <span id="stat-avg">—</span>
</div>

<div id="filters">
  <button class="filter-btn active" data-network="">🗺 Hammasi</button>
  <button class="filter-btn" data-network="Tok Bor">Tok Bor</button>
  <button class="filter-btn" data-network="Beon">Beon</button>
  <button class="filter-btn" data-network="EcoTok">EcoTok</button>
</div>

<div id="map"></div>

<div id="bottom-sheet">
  <div id="bs-header">
    <span id="bs-count">Stansiyalar</span>
    <span style="font-size:11px;color:#444">⬆ Ko'tarish</span>
  </div>
  <div id="stations-list"></div>
</div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8000' : '';
let allStations = [];
let markers = {};
let activeCardId = null;

try { window.Telegram?.WebApp?.expand(); } catch(e) {}

const map = L.map('map', {zoomControl: false}).setView([41.2995, 69.2401], 11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19, attribution: ''
}).addTo(map);
L.control.zoom({position: 'topright'}).addTo(map);

function makeIcon(active) {
  const c = active ? '#fff' : '#00d4aa';
  const bg = active ? '#00d4aa' : '#1a1a2e';
  return L.divIcon({
    html: `<div style="background:${bg};border:2px solid ${c};border-radius:50%;width:14px;height:14px;box-shadow:0 0 8px ${bg}88"></div>`,
    iconSize:[14,14], iconAnchor:[7,7], className:''
  });
}

async function loadStations(network='') {
  try {
    const url = API + '/api/stations' + (network ? '?network=' + encodeURIComponent(network) : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    allStations = await res.json();
    renderMarkers(allStations);
    renderList(allStations);
    document.getElementById('bs-count').textContent = allStations.length + ' ta stansiya';
  } catch(e) {
    document.getElementById('stations-list').innerHTML = '<div id="empty">❌ API ga ulanib bo\'lmadi.<br>Backend ishga tushirilganini tekshiring.</div>';
  }
}

async function loadStats() {
  try {
    const res = await fetch(API + '/api/stats');
    const s = await res.json();
    document.getElementById('stat-count').textContent = s.total_stations + ' ta stansiya';
    document.getElementById('stat-avg').textContent = "O'rtacha: " + s.avg_price_per_kwh + " so'm/kWh";
  } catch(e) {}
}

function renderMarkers(stations) {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  stations.forEach(s => {
    const m = L.marker([s.lat, s.lng], {icon: makeIcon(false)})
      .bindPopup(`
        <b>${s.name}</b><br>
        <span class="popup-price">${s.price_per_kwh} so'm/kWh</span>
        <span class="popup-net"> · ${s.network || ''}</span><br>
        ⚡ ${s.power_kw || '?'}kW · 🔌 ${s.connector_types || '?'}<br>
        🕐 ${s.working_hours || '24/7'}<br>
        ${s.address ? '📍 ' + s.address + '<br>' : ''}
        <button class="popup-btn" onclick="goToCard(${s.id})">Ro'yxatda ko'rish</button>
      `)
      .addTo(map);
    m.on('click', () => { activateCard(s.id); });
    markers[s.id] = m;
  });
}

function renderList(stations) {
  if (!stations.length) {
    document.getElementById('stations-list').innerHTML = '<div id="empty">Stansiya topilmadi</div>';
    return;
  }
  document.getElementById('stations-list').innerHTML = stations.map(s => `
    <div class="station-card${activeCardId===s.id?' active':''}" id="card-${s.id}" onclick="activateCard(${s.id})">
      <div class="sc-top">
        <div class="sc-name">${s.name}</div>
        <span class="price-tag">${s.price_per_kwh} so'm</span>
      </div>
      <div class="sc-meta">
        <span class="tag">${s.network || '?'}</span>
        <span class="tag">⚡ ${s.power_kw || '?'}kW</span>
        <span class="tag">🔌 ${(s.connector_types||'').split(',')[0]||'?'}</span>
        <span class="tag">🕐 ${s.working_hours||'24/7'}</span>
      </div>
      ${s.address ? `<div class="sc-addr">📍 ${s.address}</div>` : ''}
    </div>
  `).join('');
}

function activateCard(id) {
  activeCardId = id;
  const s = allStations.find(x => x.id === id);
  if (!s) return;
  map.setView([s.lat, s.lng], 14, {animate: true});
  Object.entries(markers).forEach(([mid, m]) => m.setIcon(makeIcon(parseInt(mid) === id)));
  markers[id]?.openPopup();
  document.querySelectorAll('.station-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + id);
  if (card) { card.classList.add('active'); card.scrollIntoView({behavior:'smooth', block:'nearest'}); }
}

function goToCard(id) { map.closePopup(); activateCard(id); }

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadStations(btn.dataset.network);
  });
});

(async () => {
  await Promise.all([loadStations(), loadStats()]);
  document.getElementById('loading-overlay').style.display = 'none';
})();
</script>
</body>
</html>
